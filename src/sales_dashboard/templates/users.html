<!doctype html>
<html lang="en" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Users Data — Sales Dashboard</title>
    <meta name="description" content="View and manage registered users.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .table th {
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            padding: 12px 16px;
        }
        .table td {
            vertical-align: middle;
            padding: 12px 16px;
            font-size: 0.85rem;
            color: var(--text-color);
        }
    </style>
</head>
<body>

<script>
    const t = localStorage.getItem("theme") || "light";
    document.documentElement.setAttribute("data-theme", t);
    document.addEventListener("DOMContentLoaded", () => {
        const btn = document.getElementById("darkModeToggle");
        if (btn) {
            btn.textContent = t === "dark" ? "☀️" : "🌙";
            btn.addEventListener("click", () => {
                const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
                document.documentElement.setAttribute("data-theme", next);
                localStorage.setItem("theme", next);
                btn.textContent = next === "dark" ? "☀️" : "🌙";
            });
        }
    });
</script>

    <nav class="navbar app-nav mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">👥 Users Data</span>
            <div class="d-flex gap-2 align-items-center">
                <button id="darkModeToggle" title="Toggle Dark Mode" class="btn btn-sm btn-outline-light">🌙</button>
                <a href="{{ url_for('database_view') }}" class="btn btn-warning btn-sm">⚙ Admin Panel</a>
                <a href="{{ url_for('dashboard') }}" class="btn btn-light btn-sm">📊 Dashboard</a>
                <a href="{{ url_for('admin_logout') }}" class="btn btn-outline-light btn-sm">Sign Out</a>
            </div>
        </div>
    </nav>

    <div class="container px-3 mt-4" style="max-width: 900px;">
        <div class="card mb-4" style="box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span>📋 Registered Users</span>
                <span class="badge bg-secondary">{{ users|length }} User(s)</span>
            </div>
            
            <div class="card-body p-0">
                {% if users %}
                <div class="table-responsive">
                    <table class="table table-striped table-hover mb-0">
                        <thead>
                            <tr>
                                <th style="width: 10%;">ID</th>
                                <th style="width: 35%;">Username</th>
                                <th style="width: 35%;">Email</th>
                                <th style="width: 20%; text-align: center;">Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for user in users %}
                            <tr>
                                <td><span class="badge bg-light text-dark shadow-sm">#{{ user.id }}</span></td>
                                <td style="font-weight: 500;">{{ user.username }}</td>
                                <td style="color: var(--text-muted);">{{ user.email }}</td>
                                <td style="text-align: center;">
                                    <a href="{{ url_for('delete_user', user_id=user.id) }}" class="btn btn-sm btn-outline-danger" style="font-weight: 500; font-size: 0.75rem; padding: 4px 10px;" onclick="return confirm('WARNING: Are you sure you want to completely delete user {{ user.username }}?');">
                                        Delete
                                    </a>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
                {% else %}
                <div class="p-4 text-center" style="color: var(--text-muted);">
                    <div style="font-size: 2rem; margin-bottom: 10px;">📭</div>
                    <p class="mb-0 fw-medium">No users found.</p>
                </div>
                {% endif %}
            </div>
        </div>
    </div>

</body>
</html>
