<!doctype html>
<html lang="en" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Panel — Sales Dashboard</title>
    <meta name="description" content="Admin panel to manage wholesale order data.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<script>
    const t = localStorage.getItem("theme") || "light";
    document.documentElement.setAttribute("data-theme", t);
</script>

    <nav class="navbar app-nav mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">⚙ Admin Panel</span>
            <div class="d-flex gap-2 align-items-center">
                <button id="darkModeToggle" title="Toggle Dark Mode" class="btn btn-sm btn-outline-light">🌙</button>
                <a href="{{ url_for('users_view') }}" class="btn btn-warning btn-sm">👥 Users</a>
                <a href="{{ url_for('dashboard') }}" class="btn btn-light btn-sm">📊 Dashboard</a>
                <a href="{{ url_for('admin_logout') }}" class="btn btn-outline-light btn-sm">Sign Out</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-3">
        <div class="row g-3">

            <!-- Add Order Form -->
            <div class="col-lg-4">
                <div class="card mb-3">
                    <div class="card-header">➕ Add New Order</div>
                    <div class="card-body">
                        <form id="addOrderForm">
                            <div class="mb-2"><input class="form-control form-control-sm" name="Date" placeholder="Date (YYYY-MM-DD)" required></div>
                            <div class="mb-2"><input class="form-control form-control-sm" name="Delivery Date" placeholder="Delivery Date (YYYY-MM-DD)"></div>
                            <div class="mb-2"><input class="form-control form-control-sm" name="City" placeholder="City" required></div>
                            <div class="mb-2"><input class="form-control form-control-sm" name="Product Category" placeholder="Product Category" required></div>
                            <div class="mb-2"><input class="form-control form-control-sm" name="Product Name" placeholder="Product Name" required></div>
                            <div class="mb-2"><input class="form-control form-control-sm" name="Unit Type" placeholder="Unit Type"></div>
                            <div class="mb-2"><input class="form-control form-control-sm" name="Quantity" placeholder="Quantity" type="number" step="0.01"></div>
                            <div class="mb-2"><input class="form-control form-control-sm" name="Rate (INR)" placeholder="Rate (INR)" type="number" step="0.01"></div>
                            <div class="mb-2"><input class="form-control form-control-sm" name="Total Amount (INR)" placeholder="Total Amount (INR)" type="number" step="0.01"></div>
                            <div class="mb-2"><input class="form-control form-control-sm" name="Cost per Unit (INR)" placeholder="Cost per Unit (INR)" type="number" step="0.01"></div>
                            <div class="mb-2"><input class="form-control form-control-sm" name="Total Cost (INR)" placeholder="Total Cost (INR)" type="number" step="0.01"></div>
                            <div class="mb-2"><input class="form-control form-control-sm" name="Profit (INR)" placeholder="Profit (INR)" type="number" step="0.01"></div>
                            <div class="mb-2"><input class="form-control form-control-sm" name="Profit Margin (%)" placeholder="Profit Margin (%)" type="number" step="0.01"></div>
                            <div class="mb-2"><input class="form-control form-control-sm" name="GST (%)" placeholder="GST (%)" type="number" step="0.01"></div>
                            <div class="mb-2"><input class="form-control form-control-sm" name="GST Amount (INR)" placeholder="GST Amount (INR)" type="number" step="0.01"></div>
                            <div class="mb-2"><input class="form-control form-control-sm" name="Grand Total (INR)" placeholder="Grand Total (INR)" type="number" step="0.01"></div>
                            <div class="mb-2"><input class="form-control form-control-sm" name="Amount Paid (INR)" placeholder="Amount Paid (INR)" type="number" step="0.01"></div>
                            <div class="mb-2"><input class="form-control form-control-sm" name="Balance (INR)" placeholder="Balance (INR)" type="number" step="0.01"></div>
                            <div class="mb-2"><input class="form-control form-control-sm" name="Order Status" placeholder="Order Status"></div>
                            <div class="mb-2"><input class="form-control form-control-sm" name="Payment Status" placeholder="Payment Status"></div>
                            <div class="mb-2"><input class="form-control form-control-sm" name="Payment Terms" placeholder="Payment Terms (e.g. Net 30)"></div>
                            <div class="mb-2"><input class="form-control form-control-sm" name="Retailer Name" placeholder="Retailer Name"></div>
                            <div class="mb-2"><input class="form-control form-control-sm" name="Phone Number" placeholder="Phone Number"></div>
                            <div class="mb-2"><input class="form-control form-control-sm" type="email" name="Email ID" placeholder="Email ID"></div>
                            <div class="mb-3"><textarea class="form-control form-control-sm" name="Notes" placeholder="Notes" rows="2"></textarea></div>
                            <button type="submit" class="btn btn-sm w-100" style="background:var(--accent-grad);color:#fff;font-weight:600;border-radius:var(--radius-sm);">Add Order</button>
                        </form>
                    </div>
                </div>

                <!-- Danger Zone -->
                <div class="card" style="border-color:rgba(239,68,68,0.3);">
                    <div class="card-header" style="color:var(--accent-5);border-color:rgba(239,68,68,0.2);">⚠ Danger Zone</div>
                    <div class="card-body">
                        <button id="deleteAllBtn" class="btn btn-sm btn-danger w-100">Delete All Data</button>
                        <small class="d-block mt-2" style="color:var(--text-muted);">
                            You will be asked to type <strong>DELETE ALL</strong> to confirm.
                        </small>
                    </div>
                </div>
            </div>

            <!-- Orders Table -->
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-header">📋 Orders (Latest 250)</div>
                    <div class="card-body border-bottom py-2">
                        <div class="row g-2">
                            <div class="col-md-2">
                                <select id="adminCityFilter" class="form-select form-select-sm">
                                    <option value="">All Cities</option>
                                    {% for c in filter_options.cities %}
                                    <option value="{{ c }}">{{ c }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-2">
                                <select id="adminCategoryFilter" class="form-select form-select-sm">
                                    <option value="">All Categories</option>
                                    {% for c in filter_options.categories %}
                                    <option value="{{ c }}">{{ c }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-2">
                                <select id="adminOrderStatusFilter" class="form-select form-select-sm">
                                    <option value="">All Order Status</option>
                                    {% for s in filter_options.order_statuses %}
                                    <option value="{{ s }}">{{ s }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-2">
                                <select id="adminPaymentStatusFilter" class="form-select form-select-sm">
                                    <option value="">All Payment</option>
                                    {% for s in filter_options.payment_statuses %}
                                    <option value="{{ s }}">{{ s }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-2">
                                <input id="adminStartDateFilter" type="date" class="form-control form-control-sm" title="Start Date">
                            </div>
                            <div class="col-md-2">
                                <input id="adminEndDateFilter" type="date" class="form-control form-control-sm" title="End Date">
                            </div>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-striped table-hover mb-0" id="ordersTable">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Date</th>
                                        <th>City</th>
                                        <th>Category</th>
                                        <th>Grand Total</th>
                                        <th>Profit</th>
                                        <th>Payment</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="{{ url_for('static', filename='database.js') }}"></script>
</body>
</html>
