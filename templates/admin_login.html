<!doctype html>
<html lang="en" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Login — Sales Dashboard</title>
    <meta name="description" content="Secure admin login for the Sales Dashboard.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<script>
    const t = localStorage.getItem("theme") || "light";
    document.documentElement.setAttribute("data-theme", t);
</script>

<div class="login-wrapper">
    <div class="login-card">
        <div class="login-logo">⚡</div>
        <h1 class="login-title">Admin Sign In</h1>
        <p class="login-subtitle">Sales Dashboard Control Panel</p>

        {% if error %}
        <div class="alert alert-danger py-2 mb-3" style="border-radius:var(--radius-sm);font-size:13px;">
            ⚠ {{ error }}
        </div>
        {% endif %}

        <form method="post" action="{{ url_for('admin_login') }}">
            <div class="mb-3">
                <label class="form-label" for="username">Username</label>
                <input type="text" id="username" class="form-control" name="username" autocomplete="username" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" class="form-control" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn w-100" style="background:var(--accent-grad);color:#fff;font-weight:600;padding:10px;border-radius:var(--radius-sm);font-size:0.9rem;letter-spacing:0.02em;">
                Sign In →
            </button>
        </form>

        <p class="text-center mt-4 mb-0" style="font-size:12px;color:var(--text-muted);">
            <a href="{{ url_for('dashboard') }}" style="color:var(--accent-1);text-decoration:none;">← Back to Dashboard</a>
        </p>
    </div>
</div>

</body>
</html>
